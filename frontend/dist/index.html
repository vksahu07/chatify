<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chatify Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00d68f;
    --amber: #ffaa00;
    --red: #ff4d6d;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 30% 50%, #1a0a2e 0%, var(--bg) 60%);
  }
  .login-box {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:48px; width:360px;
  }
  .login-box h1 { font-family:var(--mono); font-size:22px; color:var(--accent); margin-bottom:6px; }
  .login-box p { color:var(--muted); font-size:13px; margin-bottom:32px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:.05em; }
  .field input {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:10px 14px; color:var(--text); font-family:var(--mono); font-size:13px; outline:none;
    transition: border-color .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .btn-primary {
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px;
    padding:12px; font-family:var(--mono); font-size:13px; cursor:pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity:.85; transform:translateY(-1px); }
  .error-msg { color:var(--red); font-size:12px; margin-top:10px; text-align:center; }

  /* LAYOUT */
  #app { display:none; min-height:100vh; }
  .sidebar {
    position:fixed; left:0; top:0; bottom:0; width:220px;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:24px 0; z-index:100;
  }
  .sidebar-logo { padding:0 24px 28px; font-family:var(--mono); font-size:15px; color:var(--accent); letter-spacing:.02em; }
  .sidebar-logo span { color:var(--muted); font-size:11px; display:block; margin-top:2px; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 24px;
    color:var(--muted); font-size:13px; cursor:pointer; transition: all .15s;
    border-left:2px solid transparent;
  }
  .nav-item:hover { color:var(--text); background:var(--surface2); }
  .nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(108,99,255,.08); }
  .nav-item svg { width:16px; height:16px; flex-shrink:0; }
  .sidebar-bottom { margin-top:auto; padding:16px 24px; }
  .logout-btn {
    width:100%; background:transparent; border:1px solid var(--border); border-radius:8px;
    color:var(--muted); padding:8px; font-size:12px; cursor:pointer; font-family:var(--mono);
    transition: all .2s;
  }
  .logout-btn:hover { border-color:var(--red); color:var(--red); }

  .main { margin-left:220px; padding:32px; }
  .page { display:none; }
  .page.active { display:block; }

  /* STATS */
  .page-title { font-family:var(--mono); font-size:18px; margin-bottom:24px; color:var(--text); }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; margin-bottom:32px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:20px; position:relative; overflow:hidden;
  }
  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--accent-color, var(--accent));
  }
  .stat-label { font-size:11px; color:var(--muted); letter-spacing:.05em; margin-bottom:8px; }
  .stat-value { font-family:var(--mono); font-size:28px; color:var(--text); }
  .stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }

  /* CHART */
  .chart-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:24px; margin-bottom:32px;
  }
  .chart-title { font-size:13px; color:var(--muted); margin-bottom:16px; font-family:var(--mono); }
  .chart-bars { display:flex; align-items:flex-end; gap:8px; height:100px; }
  .bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .bar { width:100%; background:var(--accent); border-radius:3px 3px 0 0; opacity:.8; transition: opacity .2s; min-height:2px; }
  .bar:hover { opacity:1; }
  .bar-label { font-size:9px; color:var(--muted); font-family:var(--mono); }

  /* TABLE */
  .table-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .table-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
  .table-title { font-size:13px; font-family:var(--mono); color:var(--text); }
  .search-input {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:7px 12px; color:var(--text); font-size:12px; outline:none; width:200px;
    font-family:var(--sans); transition: border-color .2s;
  }
  .search-input:focus { border-color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th { padding:10px 20px; text-align:left; font-size:10px; color:var(--muted); letter-spacing:.08em; border-bottom:1px solid var(--border); font-weight:500; }
  td { padding:12px 20px; font-size:13px; border-bottom:1px solid rgba(42,42,56,.5); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface2); }
  .avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; margin-right:8px; vertical-align:middle; }
  .badge {
    display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-family:var(--mono);
  }
  .badge.active { background:rgba(0,214,143,.12); color:var(--green); border:1px solid rgba(0,214,143,.2); }
  .badge.banned { background:rgba(255,77,109,.12); color:var(--red); border:1px solid rgba(255,77,109,.2); }
  .action-btn {
    background:transparent; border:1px solid var(--border); border-radius:6px;
    padding:4px 10px; font-size:11px; cursor:pointer; color:var(--muted); font-family:var(--mono);
    transition: all .15s; margin-right:4px;
  }
  .action-btn:hover { color:var(--text); border-color:var(--accent); }
  .action-btn.danger:hover { color:var(--red); border-color:var(--red); }
  .action-btn.warn:hover { color:var(--amber); border-color:var(--amber); }
  .action-btn.success:hover { color:var(--green); border-color:var(--green); }

  .pagination { display:flex; align-items:center; gap:8px; padding:16px 20px; justify-content:flex-end; border-top:1px solid var(--border); }
  .page-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 12px; color:var(--muted); font-size:12px; cursor:pointer; font-family:var(--mono); transition: all .15s; }
  .page-btn:hover:not(:disabled) { color:var(--text); border-color:var(--accent); }
  .page-btn:disabled { opacity:.3; cursor:default; }
  .page-info { font-size:12px; color:var(--muted); font-family:var(--mono); }

  .loading { text-align:center; padding:40px; color:var(--muted); font-family:var(--mono); font-size:13px; }
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:13px; }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; right:24px; background:var(--surface2);
    border:1px solid var(--border); border-radius:10px; padding:12px 20px;
    font-size:13px; z-index:999; opacity:0; transform:translateY(10px);
    transition: all .3s; pointer-events:none;
  }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.error { border-color:var(--red); color:var(--red); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200;
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; width:400px; }
  .modal h3 { font-family:var(--mono); font-size:15px; margin-bottom:8px; }
  .modal p { color:var(--muted); font-size:13px; margin-bottom:24px; }
  .modal-btns { display:flex; gap:10px; justify-content:flex-end; }
  .btn-cancel { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 18px; color:var(--muted); font-size:13px; cursor:pointer; }
  .btn-confirm { background:var(--red); border:none; border-radius:8px; padding:8px 18px; color:#fff; font-size:13px; cursor:pointer; }

  /* MSG PREVIEW */
  .msg-text { max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:12px; }
  .msg-img { width:36px; height:36px; border-radius:6px; -o-object-fit:cover; object-fit:cover; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>⬡ CHATIFY</h1>
    <p>Admin Control Panel — restricted access</p>
    <div class="field">
      <label>USERNAME</label>
      <input type="text" id="admin-user" placeholder="admin"/>
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">ACCESS DASHBOARD</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-logo">CHATIFY<span>admin panel</span></div>
    <div class="nav-item active" onclick="showPage('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </div>
    <div class="nav-item" onclick="showPage('users')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </div>
    <div class="nav-item" onclick="showPage('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </div>
    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="logout()">← LOGOUT</button>
    </div>
  </nav>

  <main class="main">
    <!-- STATS PAGE -->
    <div class="page active" id="page-stats">
      <div class="page-title">// overview</div>
      <div class="stats-grid" id="stats-grid">
        <div class="loading">Loading stats...</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">MESSAGES — LAST 7 DAYS</div>
        <div class="chart-bars" id="chart-bars"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <!-- USERS PAGE -->
    <div class="page" id="page-users">
      <div class="page-title">// users</div>
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">ALL USERS</span>
          <input class="search-input" placeholder="Search name or email..." oninput="searchUsers(this.value)" id="user-search"/>
        </div>
        <div id="users-table-body"><div class="loading">Loading users...</div></div>
        <div class="pagination" id="users-pagination"></div>
      </div>
    </div>

    <!-- MESSAGES PAGE -->
    <div class="page" id="page-messages">
      <div class="page-title">// messages</div>
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">ALL MESSAGES</span>
          <span class="page-info" id="msg-count"></span>
        </div>
        <div id="messages-table-body"><div class="loading">Loading messages...</div></div>
        <div class="pagination" id="messages-pagination"></div>
      </div>
    </div>
  </main>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm Action</h3>
    <p id="modal-desc">Are you sure?</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ——— CONFIG ———
  // Replace this with your Chatify backend URL
  const API_BASE = "https://chatify-sus3.onrender.com";


  let token = localStorage.getItem('admin_token') || '';
  let userPage = 1, msgPage = 1, userSearch = '';
  let modalCallback = null;

  // ——— AUTH ———
  async function doLogin() {
    const username = document.getElementById('admin-user').value.trim();
    const password = document.getElementById('admin-pass').value;
    try {
      const r = await fetch(`${API_BASE}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.message);
      token = d.token;
      localStorage.setItem('admin_token', token);
      showApp();
    } catch(e) {
      document.getElementById('login-error').textContent = e.message || 'Login failed';
    }
  }

  function logout() {
    token = ''; localStorage.removeItem('admin_token');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showPage('stats');
  }

  if (token) showApp();

  // ——— API ———
  async function api(path, opts = {}) {
    const r = await fetch(`${API_BASE}/api/admin${path}`, {
      ...opts,
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers }
    });
    if (r.status === 401) { logout(); return; }
    return r.json();
  }

  // ——— NAV ———
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event?.currentTarget?.classList.add('active');
    if (name === 'stats') loadStats();
    if (name === 'users') loadUsers();
    if (name === 'messages') loadMessages();
  }

  // ——— STATS ———
  async function loadStats() {
    const d = await api('/stats');
    if (!d) return;
    const cards = [
      { label:'TOTAL USERS', value: d.totalUsers, sub: `+${d.newUsersToday} today`, color:'var(--accent)' },
      { label:'BANNED USERS', value: d.bannedUsers, sub:'currently restricted', color:'var(--red)' },
      { label:'TOTAL MESSAGES', value: d.totalMessages, sub: `+${d.messagesToday} today`, color:'var(--green)' },
      { label:'ACTIVE TODAY', value: d.newUsersToday, sub:'new signups', color:'var(--amber)' },
    ];
    document.getElementById('stats-grid').innerHTML = cards.map(c => `
      <div class="stat-card" style="--accent-color:${c.color}">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value">${c.value}</div>
        <div class="stat-sub">${c.sub}</div>
      </div>`).join('');

    // Chart
    const bars = d.last7 || [];
    const max = Math.max(...bars.map(b => b.count), 1);
    document.getElementById('chart-bars').innerHTML = bars.length
      ? bars.map(b => `
        <div class="bar-wrap">
          <div class="bar" style="height:${Math.max(4, (b.count/max)*90)}px" title="${b.count} messages"></div>
          <div class="bar-label">${b._id.slice(5)}</div>
        </div>`).join('')
      : '<div class="empty">No data yet</div>';
  }

  // ——— USERS ———
  let searchTimer;
  function searchUsers(v) { userSearch = v; userPage = 1; clearTimeout(searchTimer); searchTimer = setTimeout(loadUsers, 300); }

  async function loadUsers() {
    document.getElementById('users-table-body').innerHTML = '<div class="loading">Loading...</div>';
    const d = await api(`/users?page=${userPage}&limit=15&search=${encodeURIComponent(userSearch)}`);
    if (!d) return;

    if (!d.users?.length) {
      document.getElementById('users-table-body').innerHTML = '<div class="empty">No users found</div>';
      document.getElementById('users-pagination').innerHTML = '';
      return;
    }

    document.getElementById('users-table-body').innerHTML = `
      <table>
        <thead><tr>
          <th>USER</th><th>EMAIL</th><th>JOINED</th><th>STATUS</th><th>ACTIONS</th>
        </tr></thead>
        <tbody>${d.users.map(u => `
          <tr>
            <td>
              <span class="avatar" style="background:${strColor(u.fullName)}">${u.fullName[0].toUpperCase()}</span>
              ${u.fullName}
            </td>
            <td style="color:var(--muted);font-size:12px">${u.email}</td>
            <td style="color:var(--muted);font-size:12px;font-family:var(--mono)">${fmtDate(u.createdAt)}</td>
            <td><span class="badge ${u.isBanned ? 'banned' : 'active'}">${u.isBanned ? 'BANNED' : 'ACTIVE'}</span></td>
            <td>
              ${u.isBanned
                ? `<button class="action-btn success" onclick="confirmAction('Unban ${u.fullName}?','This will restore their access.',()=>unbanUser('${u._id}'))">UNBAN</button>`
                : `<button class="action-btn warn" onclick="confirmAction('Ban ${u.fullName}?','They will lose access to Chatify.',()=>banUser('${u._id}'))">BAN</button>`
              }
              <button class="action-btn danger" onclick="confirmAction('Delete ${u.fullName}?','All messages will also be deleted. This is permanent.',()=>deleteUser('${u._id}'))">DELETE</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    renderPagination('users-pagination', userPage, d.pages, p => { userPage = p; loadUsers(); });
  }

  async function banUser(id) { await api(`/users/${id}/ban`, { method:'PATCH' }); toast('User banned','warn'); loadUsers(); }
  async function unbanUser(id) { await api(`/users/${id}/unban`, { method:'PATCH' }); toast('User unbanned','success'); loadUsers(); }
  async function deleteUser(id) { await api(`/users/${id}`, { method:'DELETE' }); toast('User deleted','success'); loadUsers(); }

  // ——— MESSAGES ———
  async function loadMessages() {
    document.getElementById('messages-table-body').innerHTML = '<div class="loading">Loading...</div>';
    const d = await api(`/messages?page=${msgPage}&limit=20`);
    if (!d) return;

    document.getElementById('msg-count').textContent = `${d.total} total`;

    if (!d.messages?.length) {
      document.getElementById('messages-table-body').innerHTML = '<div class="empty">No messages found</div>';
      return;
    }

    document.getElementById('messages-table-body').innerHTML = `
      <table>
        <thead><tr>
          <th>FROM</th><th>TO</th><th>CONTENT</th><th>TIME</th><th>ACTION</th>
        </tr></thead>
        <tbody>${d.messages.map(m => `
          <tr>
            <td style="font-size:12px">${m.senderId?.fullName || 'Deleted'}</td>
            <td style="font-size:12px">${m.receiverId?.fullName || 'Deleted'}</td>
            <td>
              ${m.image ? `<img src="${m.image}" class="msg-img" onerror="this.style.display='none'"/>` : ''}
              ${m.text ? `<span class="msg-text">${m.text}</span>` : m.image ? '' : '<span style="color:var(--muted);font-size:12px">—</span>'}
            </td>
            <td style="color:var(--muted);font-size:11px;font-family:var(--mono)">${fmtDate(m.createdAt)}</td>
            <td>
              <button class="action-btn danger" onclick="confirmAction('Delete message?','This cannot be undone.',()=>deleteMsg('${m._id}'))">DELETE</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    renderPagination('messages-pagination', msgPage, d.pages, p => { msgPage = p; loadMessages(); });
  }

  async function deleteMsg(id) { await api(`/messages/${id}`, { method:'DELETE' }); toast('Message deleted','success'); loadMessages(); }

  // ——— HELPERS ———
  function renderPagination(id, cur, total, cb) {
    document.getElementById(id).innerHTML = `
      <span class="page-info">Page ${cur} of ${total}</span>
      <button class="page-btn" ${cur<=1?'disabled':''} onclick="(${cb.toString()})(${cur-1})">←</button>
      <button class="page-btn" ${cur>=total?'disabled':''} onclick="(${cb.toString()})(${cur+1})">→</button>`;
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'2-digit' });
  }

  function strColor(s) {
    const colors = ['#6c63ff','#ff6584','#00d68f','#ffaa00','#00b4d8','#e76f51'];
    let h = 0; for (let c of s) h = c.charCodeAt(0) + h * 31;
    return colors[Math.abs(h) % colors.length];
  }

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    setTimeout(() => t.className = 'toast', 2500);
  }

  function confirmAction(title, desc, cb) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-desc').textContent = desc;
    document.getElementById('modal').classList.add('show');
    modalCallback = cb;
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); modalCallback = null; }

  document.getElementById('modal-confirm').onclick = () => {
    if (modalCallback) modalCallback();
    closeModal();
  };
</script>
</body>
</html>
