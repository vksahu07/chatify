<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Indigo to Violet/Pink -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bubble 1 (Back) Gradient: Sleek Pink -->
    <linearGradient id="bubble1-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Glowing Background Circle -->
  <circle cx="256" cy="256" r="230" fill="url(#bg-grad)" filter="url(#drop-shadow)" />

  <!-- Main Overlapping Chat Bubbles -->
  <g filter="url(#drop-shadow)">
    <!-- Small bubble in background -->
    <path d="M360 280c0-38.7-35.8-70-80-70s-80 31.3-80 70c0 15.3 5.6 29.4 15.2 41.1l-10.2 30.6c-1.8 5.4 3 10.7 8.5 9.1l33.6-9.6c10.2 5.6 21.8 8.8 32.9 8.8 44.2 0 80-31.3 80-70z" fill="url(#bubble1-grad)" opacity="0.9" />

    <!-- Big bubble in foreground -->
    <path d="M140 210c0-49.7 44.8-90 100-90s100 40.3 100 90-44.8 90-100 90c-13.8 0-26.9-2.5-38.9-7.1l-42 12c-6.8 1.9-12.8-4.1-10.9-10.9l12.7-38.2c-12.5-13.5-20.9-30.8-20.9-45.8z" fill="#ffffff" />
  </g>

  <!-- Three dots inside the main foreground bubble -->
  <circle cx="200" cy="210" r="12" fill="#6366f1" />
  <circle cx="240" cy="210" r="12" fill="#8b5cf6" />
  <circle cx="280" cy="210" r="12" fill="#a855f7" />
</svg>
